name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CLI dependencies
        working-directory: packages/cli
        run: npm install

      - name: Lint CLI
        working-directory: packages/cli
        run: npm run lint

      - name: Type check CLI
        working-directory: packages/cli
        run: npx tsc --noEmit

      - name: Install Web dependencies
        working-directory: packages/web
        run: npm install

      - name: Type check Web
        working-directory: packages/web
        run: npx tsc --noEmit
